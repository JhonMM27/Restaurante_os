<!DOCTYPE html>
{% load static %}
<html class="{% if not config_global.tema_oscuro %}light{% else %}dark{% endif %}" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Iniciar Sesión — TICUY</title>
    <link rel="icon" type="image/png" href="{% static 'ticuy_logo_bg.png' %}" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --primary: 220 38 38;
            /* Red 600 */
            --secondary: 185 28 28;
            /* Red 700 */
            --bg: 12 14 20;
            --surface: 26 29 39;
            --border: 255 255 255;
            --on-surface: 255 255 255;
            --on-surface-variant: 165 165 177;
        }

        html.light {
            --primary: 123 14 0;
            /* Maroon TICUY */
            --secondary: 90 10 0;
            /* Oscuro */
            --bg: 243 244 246;
            --surface: 255 255 255;
            --border: 0 0 0;
            --on-surface: 17 24 39;
            --on-surface-variant: 75 85 99;
        }

        .glass-card {
            background: rgb(var(--surface) / 0.4);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgb(var(--border) / 0.2);
            box-shadow: 0 24px 64px -12px rgba(0, 0, 0, 0.4);
        }

        .text-gradient {
            background: linear-gradient(135deg, rgb(var(--primary)) 0%, rgb(var(--secondary)) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body {
            background-color: rgb(var(--bg));
            color: rgb(var(--on-surface));
        }

        html.light .text-white {
            color: rgb(var(--on-surface)) !important;
        }

        html.light .text-on-surface-variant {
            color: rgb(var(--on-surface-variant)) !important;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "rgb(var(--primary) / <alpha-value>)",
                        secondary: "rgb(var(--secondary) / <alpha-value>)",
                        background: "rgb(var(--bg) / <alpha-value>)",
                        surface: "rgb(var(--surface) / <alpha-value>)",
                        "on-surface": "rgb(var(--on-surface) / <alpha-value>)",
                        "on-surface-variant": "rgb(var(--on-surface-variant) / <alpha-value>)",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                },
            },
        }
    </script>
</head>

<body class="min-h-screen relative antialiased selection:bg-primary/30 bg-white">
    <!-- Overlay Gradiente Suave para fondo blanco -->
    <div
        class="fixed inset-0 z-0 bg-gradient-to-br from-black/20 via-transparent to-black/30 backdrop-blur-[1px] pointer-events-none">
    </div>

    <!-- Background Glows -->
    <div
        class="fixed top-[-20%] left-[-10%] w-[60%] h-[60%] bg-primary/20 rounded-full blur-[160px] pointer-events-none z-1">
    </div>
    <div
        class="fixed bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-secondary/10 rounded-full blur-[160px] pointer-events-none z-1">
    </div>

    <!-- Contenedor Principal Centrado -->
    <div
        class="relative z-10 w-full min-h-screen max-w-7xl mx-auto flex flex-col lg:flex-row items-center justify-center gap-12 lg:gap-32 p-6">

        <!-- Logo Lado Izquierdo Centro -->
        <div class="w-full lg:w-1/2 flex justify-center py-8">
            <img src="{% static 'ticuy_logo_bg.png' %}"
                class="w-full max-w-[280px] lg:max-w-md xl:max-w-[500px] h-auto object-contain drop-shadow-xl"
                alt="Logo TICUY">
        </div>

        <!-- Caja Lado Derecho Centro -->
        <main class="w-full max-w-[440px] lg:w-1/2 flex justify-center" x-data="{ showPass: false }">
            <!-- Glassmorphism Container -->
            <div
                class="w-full glass-card p-10 rounded-[48px] flex flex-col gap-8 border border-white/10 shadow-2xl shadow-black/50">

                <!-- Logo Section -->
                <div class="flex flex-col items-center gap-4 text-center">
                    <img src="{% static 'ticuy_logo_bg.png' %}"
                        class="w-24 h-24 rounded-[32px] object-cover bg-white p-1 shadow-2xl shadow-primary/30 mb-2"
                        alt="Logo">
                    <h1 class="font-display text-4xl font-black tracking-tight text-gradient">TICUY</h1>
                    <p class="font-sans text-white/60 text-sm font-medium">Command Center for Modern Dining</p>
                </div>

                <!-- Error Messages -->
                {% if form.errors %}
                <div
                    class="bg-red-500/20 border border-red-500/30 text-red-100 p-4 rounded-2xl text-sm flex items-center gap-3 animate-pulse">
                    <span class="material-symbols-outlined text-lg">error</span>
                    <span class="font-bold">Usuario o contraseña incorrectos.</span>
                </div>
                {% endif %}

                <!-- Login Form -->
                <form class="flex flex-col gap-6" method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    <!-- Username Field -->
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-white/80 uppercase tracking-[0.2em] ml-1"
                            for="id_username">Usuario</label>
                        <div class="relative group">
                            <input
                                class="w-full bg-white/10 dark:bg-white/10 border border-white/20 text-on-surface dark:text-white placeholder:text-on-surface-variant/50 rounded-2xl py-4 pl-12 pr-5 focus:ring-2 focus:ring-primary focus:border-transparent transition-all font-semibold backdrop-blur-md"
                                placeholder="Ej: admin_colega" type="text" name="username" id="id_username" required
                                autofocus />
                            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none z-20">
                                <span
                                    class="material-symbols-outlined text-on-surface-variant dark:text-white/50 group-focus-within:text-primary transition-colors text-xl">person</span>
                            </div>
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-black text-white/80 uppercase tracking-[0.2em] ml-1"
                                for="id_password">Contraseña</label>
                        </div>
                        <div class="relative group">
                            <input
                                class="w-full bg-white/10 dark:bg-white/10 border border-white/20 text-on-surface dark:text-white placeholder:text-on-surface-variant/50 rounded-2xl py-4 pl-12 pr-12 focus:ring-2 focus:ring-primary focus:border-transparent transition-all font-semibold backdrop-blur-md"
                                placeholder="••••••••••••" :type="showPass ? 'text' : 'password'" type="password"
                                name="password" id="id_password" required />

                            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none z-20">
                                <span
                                    class="material-symbols-outlined text-on-surface-variant dark:text-white/50 group-focus-within:text-primary transition-colors text-xl">lock</span>
                            </div>

                            <!-- Toggle Password Visibility -->
                            <button type="button" @click="showPass = !showPass"
                                class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant/50 hover:text-primary transition-colors z-30">
                                <span class="material-symbols-outlined text-xl"
                                    x-text="showPass ? 'visibility_off' : 'visibility'"></span>
                            </button>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button
                        class="w-full bg-primary hover:bg-white text-[#160066] font-black text-lg py-4 rounded-[24px] shadow-2xl shadow-primary/30 active:scale-[0.97] transition-all duration-300 mt-4 flex items-center justify-center gap-2"
                        type="submit">
                        <span>Entrar al Sistema</span>
                        <span class="material-symbols-outlined font-bold">arrow_forward</span>
                    </button>
                </form>

                <!-- Footer Links -->
                <div class="flex flex-col items-center gap-6 pt-4 border-t border-white/10">
                    <a href="{% url 'clientes:registro' %}"
                        class="text-white/80 hover:text-primary transition-colors text-sm font-semibold flex items-center gap-2">
                        <span class="material-symbols-outlined text-lg">person_add</span>
                        ¿No tienes cuenta? Regístrate como cliente
                    </a>
                </div>
            </div>
        </main>
    </div> <!-- End Contenedor Principal Centrado -->

    <!-- Support Context Section -->
    <footer class="fixed bottom-8 w-full flex justify-center pointer-events-none opacity-40">
        <div class="flex items-center gap-8">
        </div>
    </footer>
</body>

</html>
